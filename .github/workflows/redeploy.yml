name: Deploy and Restart PM2

on:
  push:
    branches:
      - main  # or your production branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: ${{ secrets.KNOWN_HOSTS }}
        if_key_exists: replace  # This will replace the key if it already exists

    - name: Debug - List .ssh directory
      run: ls -la ~/.ssh

    - name: Debug - Check SSH key
      run: ssh-keygen -l -f ~/.ssh/id_rsa || echo "SSH key not found"

    - name: Add known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        if [ $? -ne 0 ]; then
          echo "ssh-keyscan failed. Trying with verbose output:"
          ssh-keyscan -v -H ${{ secrets.SSH_HOST }}
          exit 1
        fi

    - name: Debug - Check known_hosts
      run: cat ~/.ssh/known_hosts

    - name: Deploy and restart PM2
      run: |
        ssh -v -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          cd /path/to/your/project
          git pull origin main
          npm install
          pm2 restart your-app-name
        EOF

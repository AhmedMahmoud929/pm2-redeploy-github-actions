name: Deploy Project

on:
  push:
    branches:
      - main
      - dev # Deploy on both main and dev branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            export PATH="$NVM_DIR/versions/node/$(ls $NVM_DIR/versions/node)/bin:$PATH"

            # Determine environment based on branch
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              BRANCH="main"
              WORKDIR="${{ secrets.WORKDIR_PROD }}"
              APP_NAME="zebralo-front"
            else
              BRANCH="dev"
              WORKDIR="${{ secrets.WORKDIR_DEV }}"
              APP_NAME="zebralo-front-dev"
            fi

            echo "🚀 Deploying branch: $BRANCH"

            cd $WORKDIR
            git pull origin $BRANCH
            npm install
            npm run build

            # Restart the correct PM2 process
            pm2 restart $APP_NAME
            pm2 save

            echo "✅ Deployment of $BRANCH branch completed!"
          debug: true

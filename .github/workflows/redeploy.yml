name: Deploy and Restart PM2

on:
  push:
    branches:
      - main # or your production branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Debug - Check SSH key
        run: ssh-keygen -l -f ~/.ssh/id_rsa
  
      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          if [ $? -ne 0 ]; then
            echo "ssh-keyscan failed. Trying with verbose output:"
            ssh-keyscan -v -H ${{ secrets.SSH_HOST }}
            exit 1
          fi
  
      - name: Debug - Check known_hosts
        run: cat ~/.ssh/known_hosts

      - name: Deploy and restart PM2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            echo "It works"
          EOF
